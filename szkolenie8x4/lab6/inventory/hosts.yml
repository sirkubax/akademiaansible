---
# LAB 6 — inventory 3-warstwowe.
# Grupy = WARSTWY architektury: loadbalancers / appservers / databases.
#
# CO-LOCATION w labie: macie 2 hosty, a warstwy sa 3 — wiec hosty
# NALEZA DO KILKU GRUP naraz (host moze byc w wielu grupach!):
#
#   web01 → load balancer + baza danych + serwer aplikacji
#   web02 →                              serwer aplikacji
#
# W PRODUKCJI kazda warstwa to osobne maszyny — tu laczymy je,
# bo to tylko cwiczenie. Adresy IP i uzytkownika dostaniesz od prowadzacego.

all:
  vars:
    ansible_user: ubuntu                          # <-- zmien na wlasciwego uzytkownika
    ansible_ssh_private_key_file: ~/.ssh/id_rsa   # <-- zmien na wlasciwy klucz

  children:

    loadbalancers:
      hosts:
        web01:

    databases:
      hosts:
        web01:

    appservers:
      hosts:
        web01:
        web02:

    # Definicje adresow — w jednym miejscu, niezaleznie od przynaleznosci do grup
    wszystkie:
      hosts:
        web01:
          ansible_host: 1.2.3.4    # <-- uzupelnij adres IP hosta 1
        web02:
          ansible_host: 1.2.3.5    # <-- uzupelnij adres IP hosta 2
