---
# Uzupelnij ponizsze dane — adresy IP i uzytkownika dostaniesz od prowadzacego
# UWAGA: hosty sa w grupach srodowisk (dev / prod) — to podstawa tego labu!
all:
  vars:
    ansible_user: ubuntu                          # <-- zmien na wlasciwego uzytkownika
    ansible_ssh_private_key_file: ~/.ssh/id_rsa   # <-- zmien na wlasciwy klucz

  children:
    webservers:
      children:
        dev:
          hosts:
            web01:
              ansible_host: 1.2.3.4    # <-- uzupelnij adres IP hosta 1
        prod:
          hosts:
            web02:
              ansible_host: 1.2.3.5    # <-- uzupelnij adres IP hosta 2
