---
# LAB 2 — Krok 4: generowanie raportu z szablonu Jinja2
# Uruchomienie:
#   ansible-playbook generuj_raport.yml
#   cat /tmp/szkolenie8x4/raport.txt
#
# Uzupelnij szablon: templates/raport.txt.j2
# Test rozwiazania:
#   ansible-playbook generuj_raport.yml -e szablon=raport_odpowiedz.txt.j2

- name: Generowanie raportu z szablonu Jinja2
  hosts: localhost
  gather_facts: true

  vars_files:
    - dane.yml

  vars:
    szablon: raport.txt.j2
    katalog_wynikowy: /tmp/szkolenie8x4

  tasks:

    - name: Stworz katalog wynikowy
      file:
        path: "{{ katalog_wynikowy }}"
        state: directory
        mode: '0755'

    - name: Wygeneruj raport z szablonu
      template:
        src: "templates/{{ szablon }}"
        dest: "{{ katalog_wynikowy }}/raport.txt"
        mode: '0644'

    - name: Gotowe — obejrzyj wynik
      debug:
        msg: "cat {{ katalog_wynikowy }}/raport.txt"
