    - name: Bezpieczna aktualizacja systemu
      # TODO: Uzyj modulu apt
      #       Tryb aktualizacji: safe   (parametr upgrade)

    # Ponizsze taski sa GOTOWE — przeanalizuj je.
    # To zajawka spotkania 4: register + when.

    - name: Sprawdz czy system wymaga restartu
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Poinformuj o koniecznosci restartu
      debug:
        msg: >
          UWAGA: {{ inventory_hostname }} wymaga restartu
          po aktualizacji (jadro/libc).
      when: reboot_required.stat.exists

