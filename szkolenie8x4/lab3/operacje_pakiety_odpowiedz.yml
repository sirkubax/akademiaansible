---
# LAB 3 — Krok 1: pakiety i aktualizacja systemu (ROZWIAZANIE)
# Uruchomienie:
#   ansible-playbook -i inventory/hosts.yml operacje_pakiety_odpowiedz.yml

- name: Standard firmowy — pakiety i aktualizacja
  hosts: all
  become: true

  tasks:
    - name: Zainstaluj firmowy zestaw narzedzi
      ansible.builtin.apt:
        name:
          - htop
          - vim
          - curl
          - tree
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Usun nano wraz z konfiguracja
      ansible.builtin.apt:
        name: nano
        state: absent
        purge: true
        autoremove: true

    - name: Bezpieczna aktualizacja systemu
      ansible.builtin.apt:
        upgrade: safe

    - name: Sprawdz czy system wymaga restartu
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Poinformuj o koniecznosci restartu
      ansible.builtin.debug:
        msg: >
          UWAGA: {{ inventory_hostname }} wymaga restartu
          po aktualizacji (jadro/libc).
      when: reboot_required.stat.exists

    # Swiadomie NIE restartujemy hostow w labie.
    # Na produkcji: modul reboot + serial (patrz prezentacja).
