---
- name: Zainstaluj webserver
  package:
    name: "{{ webserver_package }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Zainstaluj webserver (RedHat)
  package:
    name: httpd
    state: present
  when: ansible_os_family == "RedHat"

- name: Uruchom i wlacz autostart
  service:
    name: "{{ webserver_service }}"
    state: started
    enabled: true

- name: Stworz katalog aplikacji
  file:
    path: "{{ webserver_docroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Wgraj strone glowna
  copy:
    src: index.html
    dest: "{{ webserver_docroot }}/index.html"
    owner: www-data
    group: www-data
    mode: '0644'

- name: Wgraj konfiguracje Virtual Host z szablonu
  template:
    src: vhost.conf.j2
    dest: /etc/apache2/sites-available/myapp.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload webserver

- name: Wlacz site w Apache
  command: a2ensite myapp.conf
  args:
    creates: /etc/apache2/sites-enabled/myapp.conf
  notify: reload webserver

- name: Sprawdz ze webserver odpowiada
  wait_for:
    host: localhost
    port: "{{ webserver_port }}"
    state: started
    timeout: 15
