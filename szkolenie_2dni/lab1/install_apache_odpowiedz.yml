---
# LAB 1 — ODPOWIEDZ
# Uruchomienie:
#   ansible-playbook -i ../lab0_w1/inventory/hosts.yml install_apache_odpowiedz.yml

- name: Instalacja i konfiguracja Apache
  hosts: webservers
  become: true

  handlers:
    - name: reload apache
      service:
        name: apache2
        state: reloaded

    - name: reload httpd
      service:
        name: httpd
        state: reloaded

  tasks:

    - name: Zainstaluj apache2 (Debian/Ubuntu)
      apt:
        name: apache2
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Zainstaluj httpd (RedHat/CentOS)
      package:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"

    - name: Uruchom i wlacz autostart apache2 (Debian)
      service:
        name: apache2
        state: started
        enabled: true
      when: ansible_os_family == "Debian"

    - name: Uruchom i wlacz autostart httpd (RedHat)
      service:
        name: httpd
        state: started
        enabled: true
      when: ansible_os_family == "RedHat"

    - name: Stworz katalog aplikacji
      file:
        path: /var/www/html/app
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Wgraj strone glowna
      copy:
        src: files/index.html
        dest: /var/www/html/app/index.html
        owner: www-data
        group: www-data
        mode: '0644'
      notify: reload apache

    - name: Sprawdz ze Apache odpowiada na porcie 80
      wait_for:
        host: localhost
        port: 80
        state: started
        timeout: 10
